<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 专业认证年度备案系统</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="images/swjtu_school_emblem1.png" alt="西南交通大学校徽" class="logo-img">
                <span class="logo-text">西南交通大学 - 专业认证年度备案系统</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">返回首页</a></li>
            </ul>
        </div>
    </nav>

    <!-- 登录/注册容器 -->
    <div class="auth-container">
        <div class="auth-box">
            <!-- 标签切换 -->
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
                <button class="tab-btn" data-tab="register">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </div>

            <!-- 登录表单 -->
            <div class="auth-form active" id="login-form">
                <div class="form-header">
                    <img src="images/swjtu_school_emblem1.png" alt="校徽" class="form-logo">
                    <h2>用户登录</h2>
                    <p>请输入您的账号和密码</p>
                </div>
                <form id="loginForm" method="POST" action="/api/auth/login">
                    <div class="form-group">
                        <label for="loginUsername">
                            <i class="fas fa-user"></i> 用户名/工号
                        </label>
                        <input type="text" id="loginUsername" name="username" required placeholder="请输入用户名或工号">
                        <span class="error-msg" id="loginUsernameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <div class="password-input">
                            <input type="password" id="loginPassword" name="password" required placeholder="请输入密码">
                            <button type="button" class="toggle-password" id="toggleLoginPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-msg" id="loginPasswordError"></span>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </form>
                <div class="form-message" id="loginMessage"></div>
            </div>

            <!-- 注册表单 -->
            <div class="auth-form" id="register-form">
                <div class="form-header">
                    <img src="images/swjtu_school_emblem1.png" alt="校徽" class="form-logo">
                    <h2>用户注册</h2>
                    <p>请填写以下信息完成注册</p>
                </div>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="registerUsername">
                            <i class="fas fa-user"></i> 用户名
                        </label>
                        <input type="text" id="registerUsername" name="username" required placeholder="请输入用户名（3-20个字符）"
                            minlength="3" maxlength="20">
                        <span class="error-msg" id="registerUsernameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerWorkId">
                            <i class="fas fa-id-card"></i> 工号
                        </label>
                        <input type="text" id="registerWorkId" name="workId" required placeholder="请输入工号">
                        <span class="error-msg" id="registerWorkIdError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerRealName">
                            <i class="fas fa-id-badge"></i> 真实姓名
                        </label>
                        <input type="text" id="registerRealName" name="realName" required placeholder="请输入真实姓名">
                        <span class="error-msg" id="registerRealNameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerRole">
                            <i class="fas fa-user-tag"></i> 注册身份
                        </label>
                        <select id="registerRole" name="role" class="form-input" required>
                            <option value="">请选择身份</option>
                            <option value="TEACHER">普通教师</option>
                            <option value="ASSESSOR">审核员</option>
                            <option value="ADMIN">管理员</option>
                        </select>
                        <span class="error-msg" id="registerRoleError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">
                            <i class="fas fa-envelope"></i> 邮箱
                        </label>
                        <input type="email" id="registerEmail" name="email" required placeholder="请输入邮箱地址">
                        <span class="error-msg" id="registerEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerPhone">
                            <i class="fas fa-phone"></i> 手机号
                        </label>
                        <input type="tel" id="registerPhone" name="phone" required placeholder="请输入手机号"
                            pattern="[0-9]{11}">
                        <span class="error-msg" id="registerPhoneError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <div class="password-input">
                            <input type="password" id="registerPassword" name="password" required
                                placeholder="请输入密码（至少6位）" minlength="6">
                            <button type="button" class="toggle-password" id="toggleRegisterPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-msg" id="registerPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label for="registerConfirmPassword">
                            <i class="fas fa-lock"></i> 确认密码
                        </label>
                        <div class="password-input">
                            <input type="password" id="registerConfirmPassword" name="confirmPassword" required
                                placeholder="请再次输入密码">
                            <button type="button" class="toggle-password" id="toggleConfirmPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-msg" id="registerConfirmPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label class="agree-terms">
                            <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                            <span>我已阅读并同意 <a href="#" target="_blank">《用户协议》</a> 和 <a href="#"
                                    target="_blank">《隐私政策》</a></span>
                        </label>
                        <span class="error-msg" id="agreeTermsError"></span>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-user-plus"></i> 注册
                    </button>
                </form>
                <div class="form-message" id="loginMessage"></div>
            </div>
        </div>
    </div>

    <!-- 测试按钮 -->
    <button onclick="testJS()" hidden="hidden"
        style="position:fixed;bottom:10px;right:10px;z-index:9999;padding:10px;background:red;color:white;border:none;cursor:pointer;">
        测试JS是否加载
    </button>

    <script>
        function testJS() {
            alert('auth.js 已加载！');
        }
    </script>
    <script src="js/auth.js"></script>
</body>

</html>
